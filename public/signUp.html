<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SWIS - Sign Up</title>
    <link rel="stylesheet" href="styleSignIn.css">
</head>
<body>

<div class="container">
    <div class="logo">🎓</div>
    <h1>SWIS</h1>
    <p class="subtitle">Student Workload Intelligence System</p>

    <div class="card">
        <h2>Sign Up</h2>

        <label>Full Name</label>
        <input type="text" placeholder="">

        <label>School ID</label>
        <input type="text" placeholder="">

        <label>Major</label>
        <input type="text" placeholder="">

        <label>Email Address</label>
        <input type="email" placeholder="">

        <label>Password</label>
        <input type="password" placeholder="">

        <button onclick="signUp()">Create Account</button>

        <p class="switch">Already have an account? <a href="signIn.html">Sign in here</a></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
