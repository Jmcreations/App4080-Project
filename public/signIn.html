<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SWIS - Sign In</title>
    <link rel="stylesheet" href="styleSignIn.css">
</head>
<body>

<div class="container">
    <div class="logo">🎓</div>
    <h1>SWIS</h1>
    <p class="subtitle">Student Workload Intelligence System</p>

    <div class="card">
        <h2>Sign In</h2>

        <label>Email Address</label>
        <input type="email" placeholder="">

        <label>Password</label>
        <input type="password" placeholder="">

        <button onclick="signIn()">Sign In</button>

        <p class="switch">Don't have an account? <a href="signUp.html">Register here</a></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
